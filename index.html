<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineMap | 영화 속 장소를 여행으로</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/map.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Cinematic location planner</p>
        <h1>CineMap</h1>
      </div>
      <div class="header-actions">
        <button class="icon-button" data-action="reset-view" title="지도 초기화" aria-label="지도 초기화">↺</button>
        <button class="route-chip" data-action="toggle-route" aria-expanded="true">
          루트 <span id="route-count">0</span>
        </button>
      </div>
    </header>

    <main class="app-shell" id="app">
      <section class="toolbar" aria-label="촬영지 필터">
        <div>
          <label for="search-input">검색</label>
          <input id="search-input" type="search" placeholder="작품, 도시, 장면" autocomplete="off" />
        </div>
        <div>
          <span class="control-label">작품</span>
          <div class="segmented" id="title-filters"></div>
        </div>
        <div>
          <span class="control-label">장르</span>
          <div class="segmented" id="genre-filters"></div>
        </div>
      </section>

      <section class="workspace" aria-label="시네맵 작업 영역">
        <div class="map-stage">
          <div class="map-topline">
            <span id="result-count">0 spots</span>
            <span>클릭하면 촬영지 카드가 열립니다</span>
          </div>
          <div id="map-root" class="map-root"></div>
        </div>

        <aside id="detail-panel" class="detail-panel" aria-live="polite"></aside>
      </section>

      <section id="route-panel" class="route-panel is-open" aria-label="나만의 성지순례 루트"></section>
    </main>

    <div id="modal-root"></div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
